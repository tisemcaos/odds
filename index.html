<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acompanhe jogos de futebol ao vivo, resultados e próximas partidas">
    <title>⚽ Live Football - Jogos Ao Vivo</title>
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
    <!-- Background Animado -->
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Container Principal -->
    <div class="app-container">
        
        <!-- Header com Glassmorphism -->
        <header class="header-glass">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <h1>Live Football</h1>
                <span class="live-dot"></span>
            </div>
            
            <!-- Navegação por Tabs -->
            <nav class="nav-tabs">
                <button class="tab active" data-tab="hoje">
                    <i class="fas fa-calendar-day"></i> 
                    Hoje
                </button>
                <button class="tab" data-tab="proximos">
                    <i class="fas fa-forward"></i> 
                    Próximos
                </button>
                <button class="tab" data-tab="todos">
                    <i class="fas fa-list"></i> 
                    Todos
                </button>
            </nav>

            <!-- Barra de Busca -->
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar time...">
            </div>
        </header>

        <!-- Área Principal -->
        <main>
            <!-- Filtros Rápidos -->
            <div class="quick-filters">
                <div class="date-picker">
                    <label><i class="fas fa-calendar-alt"></i> Data</label>
                    <input type="date" id="dataFiltro" title="Selecionar data">
                </div>
                
                <div class="filter-actions">
                    <button class="btn-filter" onclick="buscarPorData()" title="Buscar">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button class="btn-hoje" onclick="buscarHoje()" title="Jogos de hoje">
                        <i class="fas fa-calendar-day"></i> Hoje
                    </button>
                    <button class="btn-refresh" onclick="atualizarJogos()" title="Atualizar">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Loading Skeleton -->
            <div id="loadingSkeleton" class="skeleton-container" style="display: none;">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

            <!-- Container de Jogos -->
            <div id="jogosContainer" class="matches-grid"></div>

            <!-- Estado Vazio -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-futbol"></i>
                <h3>Nenhum jogo encontrado</h3>
                <p>Tente mudar os filtros ou selecionar outra data</p>
            </div>
        </main>
    </div>

    <!-- Botão Flutuante (Scroll to Top) -->
    <button class="fab" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Voltar ao topo">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
