<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos de Futebol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .filtro-container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .filtro-data {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="date"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            flex: 1;
            min-width: 200px;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-hoje {
            background: #48bb78;
        }

        .btn-hoje:hover {
            background: #38a169;
        }

        .jogos-container {
            display: grid;
            gap: 20px;
        }

        .jogo-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .jogo-card:hover {
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(-3px);
        }

        .campeonato-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .campeonato-header img {
            width: 30px;
            height: 30px;
        }

        .campeonato-nome {
            font-weight: bold;
            color: #4a5568;
        }

        .rodada {
            margin-left: auto;
            color: #718096;
            font-size: 0.9em;
        }

        .placar-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }

        .time {
            text-align: center;
            flex: 1;
        }

        .time img {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .time-nome {
            font-weight: bold;
            color: #2d3748;
        }

        .placar {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin: 0 20px;
        }

        .placar-vs {
            color: #a0aec0;
        }

        .info-jogo {
            text-align: center;
            color: #718096;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .status-jogo {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status-ao-vivo {
            background: #fed7d7;
            color: #c53030;
            animation: pulse 2s infinite;
        }

        .status-agendado {
            background: #c6f6d5;
            color: #276749;
        }

        .status-finalizado {
            background: #e2e8f0;
            color: #4a5568;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .erro {
            text-align: center;
            padding: 20px;
            color: #c53030;
            background: #fed7d7;
            border-radius: 10px;
        }

        .total-jogos {
            text-align: center;
            margin: 20px 0;
            color: #4a5568;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .placar-container {
                flex-direction: column;
            }
            
            .filtro-data {
                flex-direction: column;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Jogos de Futebol</h1>
        
        <div class="filtro-container">
            <div class="filtro-data">
                <input type="date" id="dataFiltro" />
                <button onclick="buscarJogosPorData()">🔍 Buscar Jogos</button>
                <button class="btn-hoje" onclick="buscarJogosHoje()">📅 Jogos de Hoje</button>
            </div>
        </div>

        <div id="totalJogos" class="total-jogos" style="display: none;"></div>
        <div id="jogosContainer" class="jogos-container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Carregando jogos...</p>
            </div>
        </div>
    </div>

    <script>
        // Define a data atual como padrão no input
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataFiltro').value = hoje;

        // Carrega os jogos de hoje automaticamente
        window.onload = () => {
            buscarJogosHoje();
        };

        async function buscarJogos(data) {
            const container = document.getElementById('jogosContainer');
            const loading = document.getElementById('loading');
            const totalJogos = document.getElementById('totalJogos');
            
            // Mostra loading
            loading.style.display = 'block';
            container.innerHTML = '';
            totalJogos.style.display = 'none';

            try {
                const response = await fetch(`/api/jogos/${data}`);
                
                if (!response.ok) {
                    throw new Error('Erro na requisição');
                }

                const dados = await response.json();
                
                if (!dados.sucesso) {
                    throw new Error(dados.mensagem || 'Erro ao buscar dados');
                }

                exibirJogos(dados);
                
            } catch (erro) {
                container.innerHTML = `
                    <div class="erro">
                        <h3>😕 Erro ao carregar jogos</h3>
                        <p>${erro.message}</p>
                        <p style="margin-top: 10px;">Verifique se o servidor está rodando e a API key está configurada.</p>
                    </div>
                `;
            } finally {
                loading.style.display = 'none';
            }
        }

        function exibirJogos(dados) {
            const container = document.getElementById('jogosContainer');
            const totalJogos = document.getElementById('totalJogos');

            if (!dados.jogos || dados.jogos.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #718096;">
                        <h3>📅 Nenhum jogo encontrado para ${formatarData(dados.data_consulta)}</h3>
                        <p>Tente outra data!</p>
                    </div>
                `;
                totalJogos.style.display = 'none';
                return;
            }

            // Exibe total de jogos
            totalJogos.style.display = 'block';
            totalJogos.innerHTML = `📊 ${dados.total_jogos} jogo(s) encontrado(s) para ${formatarData(dados.data_consulta)}`;

            // Agrupa jogos por campeonato
            const jogosPorCampeonato = dados.jogos.reduce((acc, jogo) => {
                if (!acc[jogo.campeonato.nome]) {
                    acc[jogo.campeonato.nome] = [];
                }
                acc[jogo.campeonato.nome].push(jogo);
                return acc;
            }, {});

            // Renderiza os jogos
            let html = '';
            for (const [campeonato, jogos] of Object.entries(jogosPorCampeonato)) {
                jogos.forEach(jogo => {
                    const statusClass = getStatusClass(jogo.status);
                    html += `
                        <div class="jogo-card">
                            <div class="campeonato-header">
                                ${jogo.campeonato.logo ? `<img src="${jogo.campeonato.logo}" alt="${campeonato}" />` : ''}
                                <span class="campeonato-nome">${campeonato}</span>
                                <span class="rodada">${jogo.campeonato.rodada || ''}</span>
                            </div>
                            
                            <div class="placar-container">
                                <div class="time">
                                    ${jogo.timeCasa.logo ? `<img src="${jogo.timeCasa.logo}" alt="${jogo.timeCasa.nome}" />` : ''}
                                    <div class="time-nome">${jogo.timeCasa.nome}</div>
                                </div>
                                
                                <div class="placar ${!jogo.placar.includes('null') ? '' : 'placar-vs'}">
                                    ${jogo.placar.includes('null') ? 'VS' : jogo.placar}
                                </div>
                                
                                <div class="time">
                                    ${jogo.timeVisitante.logo ? `<img src="${jogo.timeVisitante.logo}" alt="${jogo.timeVisitante.nome}" />` : ''}
                                    <div class="time-nome">${jogo.timeVisitante.nome}</div>
                                </div>
                            </div>
                            
                            <div class="info-jogo">
                                <span class="status-jogo ${statusClass}">${jogo.status}</span><br>
                                <span style="margin-right: 10px;">📅 ${formatarDataHora(jogo.data)}</span>
                                <span>🕐 ${jogo.horario}</span>
                                ${jogo.estadio ? `<br>🏟️ ${jogo.estadio}` : ''}
                                ${jogo.cidade ? ` - ${jogo.cidade}` : ''}
                            </div>
                        </div>
                    `;
                });
            }

            container.innerHTML = html;
        }

        function getStatusClass(status) {
            if (status.includes('Live') || status.includes('Ao vivo')) return 'status-ao-vivo';
            if (status.includes('Finished') || status.includes('Finalizado')) return 'status-finalizado';
            return 'status-agendado';
        }

        function formatarData(data) {
            const [ano, mes, dia] = data.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function formatarDataHora(data) {
            const dataObj = new Date(data);
            return dataObj.toLocaleDateString('pt-BR');
        }

        function buscarJogosPorData() {
            const data = document.getElementById('dataFiltro').value;
            if (data) {
                buscarJogos(data);
            }
        }

        function buscarJogosHoje() {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataFiltro').value = hoje;
            buscarJogos(hoje);
        }
    </script>
</body>
</html>
